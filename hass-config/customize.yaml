# Global friendly names (Serbian) for entities shown outside the dashboard.
#
# The three MultiSensor 6 units are named at the DEVICE level (Dnevna soba,
# Dnevna soba suteren, Hodnik na spratu) so their entities inherit the room.
# Per-sensor Serbian labels (Temperatura, Vlažnost, ...) are set in the room
# cards in ui-lovelace.yaml, where the room provides context.

# ---- Home Energy Meter Gen5 (aggregate / whole-house) ----
sensor.home_energy_meter_gen5_electric_consumption_w:
  friendly_name: Trenutna potrošnja
sensor.home_energy_meter_gen5_electric_consumption_kwh:
  friendly_name: Ukupna potrošnja
sensor.home_energy_meter_gen5_electric_consumption_v:
  friendly_name: Napon na mreži
sensor.home_energy_meter_gen5_electric_consumption_a:
  friendly_name: Protok struje

# ---- System / diagnostics ----
sensor.processor_temperature:
  friendly_name: Temperatura procesora
sensor.processor_use:
  friendly_name: Opterećenje procesora
sensor.memory_use_percent:
  friendly_name: Iskorišćenost memorije
  icon: mdi:memory
sensor.disk_use_percent:
  friendly_name: Iskorišćenost diska
  icon: mdi:harddisk
sensor.last_boot:
  friendly_name: Poslednje pokretanje
sensor.pi_uptime:
  friendly_name: Vreme rada
  icon: mdi:timelapse
sensor.ha_current_version:
  friendly_name: HA trenutna verzija
  icon: mdi:checkbox-marked-circle-outline
sensor.ha_latest_release:
  friendly_name: HA najnovija verzija
  icon: mdi:update
binary_sensor.internet:
  friendly_name: Internet
binary_sensor.grejanje_servis:
  friendly_name: Grejanje (servis)
  icon: mdi:radiator
sun.sun:
  friendly_name: Doba dana
