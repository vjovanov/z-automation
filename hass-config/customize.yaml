# Serbian friendly names for the live Z-Wave JS + system entities.
# NOTE: the three MultiSensor 6 units are physically identical, so HA appends
# _2/_3 to duplicate names. Which suffix maps to which room is not derivable
# remotely — rename the *devices* in Settings -> Devices to per-room names when
# convenient; that cascades to all their entities.

# ---- Home Energy Meter Gen5 (aggregate / whole-house) ----
sensor.home_energy_meter_gen5_electric_consumption_w:
  friendly_name: Trenutna potrošnja
sensor.home_energy_meter_gen5_electric_consumption_kwh:
  friendly_name: Ukupna potrošnja
sensor.home_energy_meter_gen5_electric_consumption_v:
  friendly_name: Napon na mreži
sensor.home_energy_meter_gen5_electric_consumption_a:
  friendly_name: Protok struje

# ---- MultiSensor 6 (sensor 1) ----
sensor.multisensor_6_air_temperature:
  friendly_name: Temperatura
sensor.multisensor_6_humidity:
  friendly_name: Relativna vlažnost
  icon: mdi:water-percent
sensor.multisensor_6_illuminance:
  friendly_name: Osvetljenost
sensor.multisensor_6_ultraviolet:
  friendly_name: UV zračenje
binary_sensor.multisensor_6_motion_detection:
  friendly_name: Detekcija pokreta

# ---- MultiSensor 6 (sensor 2) ----
sensor.multisensor_6_air_temperature_2:
  friendly_name: Temperatura 2
sensor.multisensor_6_humidity_2:
  friendly_name: Relativna vlažnost 2
  icon: mdi:water-percent
sensor.multisensor_6_illuminance_2:
  friendly_name: Osvetljenost 2
sensor.multisensor_6_ultraviolet_2:
  friendly_name: UV zračenje 2
binary_sensor.multisensor_6_motion_detection_2:
  friendly_name: Detekcija pokreta 2

# ---- MultiSensor 6 (sensor 3 — appears once fully interviewed) ----
sensor.multisensor_6_air_temperature_3:
  friendly_name: Temperatura 3
binary_sensor.multisensor_6_motion_detection_3:
  friendly_name: Detekcija pokreta 3

# ---- System / diagnostics ----
sensor.processor_temperature:
  friendly_name: Temperatura procesora
sensor.processor_use:
  friendly_name: Opterećenje procesora
sensor.memory_use_percent:
  friendly_name: Iskorišćenost memorije
  icon: mdi:memory
sensor.disk_use_percent:
  friendly_name: Iskorišćenost diska
  icon: mdi:harddisk
sensor.last_boot:
  friendly_name: Poslednje pokretanje
sensor.pi_uptime:
  friendly_name: Vreme rada
  icon: mdi:timelapse
sensor.ha_current_version:
  friendly_name: HA trenutna verzija
  icon: mdi:checkbox-marked-circle-outline
sensor.ha_latest_release:
  friendly_name: HA najnovija verzija
  icon: mdi:update
binary_sensor.internet:
  friendly_name: Internet
sun.sun:
  friendly_name: Doba dana
