# Home Assistant configuration — Zlatibor
#
# Modernized 2026-07 for Home Assistant 2023.1.7 + Z-Wave JS.
#
# IMPORTANT: This file targets HA 2023.1.7 syntax on purpose — that is the last
# HA release that runs on this Pi's Python 3.9. When migrating to a newer HA
# (see README "Migrating to latest HA"), the `command_line` / `systemmonitor`
# blocks below must move to their newer top-level formats.
#
# Z-Wave is handled by the `zwave_js` integration (config entry -> zwave-js-server
# on ws://localhost:3000). There is intentionally NO `zwave:` YAML here anymore.
# Heating is owned by the separate Go `heating-controller` (systemd, :8080); HA
# only surfaces its web UI / service health and does not control heating.

default_config:

homeassistant:
  name: Zlatibor
  latitude: 43.7321
  longitude: 19.7054
  elevation: 981
  unit_system: metric
  time_zone: Europe/Belgrade
  customize: !include customize.yaml

# Version-controlled dashboard (see ui-lovelace.yaml).
lovelace:
  mode: yaml

# ---- Recorder: keep history modest and cut disk writes on the Pi ----
# Default purges at 10 days; we set 14 and batch commits every 30 s. Excluded
# entities still work live (current state), they just are not kept in history.
recorder:
  purge_keep_days: 14
  commit_interval: 30
  exclude:
    entities:
      - sensor.ha_current_version
      - sensor.ha_latest_release
      - sensor.pi_uptime
      - sensor.last_boot
      - sensor.load_1m
      - sensor.load_5m
      - sensor.memory_free
      - sensor.disk_free
    entity_globs:
      - sensor.*_node_status*
      - binary_sensor.multisensor_6_tampering*

# ---- Heating: surfaced from the Go heating-controller on :8080 ----
panel_iframe:
  heating:
    title: Grejanje
    icon: mdi:radiator
    url: "http://10.92.0.2:8080"

# ---- System monitoring ----
sensor:
  - platform: systemmonitor
    resources:
      - type: disk_use_percent
      - type: disk_free
      - type: memory_free
      - type: memory_use_percent
      - type: load_1m
      - type: load_5m
      - type: last_boot
      - type: processor_use
      - type: processor_temperature
  - platform: command_line
    name: Pi Uptime
    command: "uptime -p"
    scan_interval: 300
  - platform: command_line
    name: HA Current Version
    command: "/srv/homeassistant/bin/hass --version"
    scan_interval: 3600
    command_timeout: 30
  - platform: command_line
    name: HA Latest Release
    command: >
      /srv/homeassistant/bin/python3 -c "import requests;
      print(requests.get('https://pypi.org/pypi/homeassistant/json').json()['info']['version'])"
    scan_interval: 3600
    command_timeout: 60

binary_sensor:
  - platform: ping
    name: Internet
    host: 8.8.8.8
    scan_interval: 60
  - platform: command_line
    name: Grejanje servis
    command: "/bin/systemctl is-active heating-controller"
    payload_on: "active"
    payload_off: "inactive"
    scan_interval: 30

# ---- Derived / outdoor sensors (replace the retired dark_sky sensors) ----
template:
  - sensor:
      - name: "Spoljna temperatura"
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ state_attr('weather.forecast_zlatibor','temperature') }}"
      - name: "Spoljna vlažnost"
        unit_of_measurement: "%"
        device_class: humidity
        state: "{{ state_attr('weather.forecast_zlatibor','humidity') }}"
      - name: "Vazdušni pritisak"
        unit_of_measurement: "hPa"
        device_class: pressure
        state: "{{ state_attr('weather.forecast_zlatibor','pressure') }}"
      - name: "Brzina vetra"
        unit_of_measurement: "km/h"
        state: "{{ state_attr('weather.forecast_zlatibor','wind_speed') }}"
      - name: "Prosečna temperatura"
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% set ns = namespace(vals=[]) %}
          {% for e in [
              'sensor.multisensor_6_air_temperature',
              'sensor.multisensor_6_air_temperature_2',
              'sensor.multisensor_6_air_temperature_3'] %}
            {% set v = states(e) %}
            {% if v not in ['unknown','unavailable','none',''] %}
              {% set ns.vals = ns.vals + [v | float] %}
            {% endif %}
          {% endfor %}
          {{ (ns.vals | sum / ns.vals | length) | round(1) if ns.vals | length > 0 else 'unavailable' }}

# ---- Alarm (HA-native; replaces the old /home/pi/alarm file + report-motion.sh) ----
input_boolean:
  alarm_armed:
    name: Alarm
    icon: mdi:security

# SMS notifications via MessageBird (replaces report-motion.sh).
# Fill messagebird_auth in secrets.yaml with: "AccessKey <your-key>"
rest_command:
  messagebird_sms:
    url: "https://rest.messagebird.com/messages"
    method: POST
    headers:
      Authorization: !secret messagebird_auth
    content_type: "application/x-www-form-urlencoded"
    payload: "recipients={{ recipient }}&originator=Zlatibor&body={{ body | urlencode }}"

# Notification fan-out for the alarm. persistent_notification is always valid;
# mobile_app_vojin_s_pixel is the HA Companion app on the phone (push). Add more
# phones after registering the app, e.g. `- service: mobile_app_<device-name>`.
notify:
  - platform: group
    name: alarm_targets
    services:
      - service: persistent_notification
      - service: mobile_app_vojin_s_pixel

# ---- Text to speech ----
tts:
  - platform: google_translate

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
